name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      # TODO(v0.1.0): re-enable coverage gate once http package has tests and
      # stdio function coverage reaches the 80% threshold.
      - run: pnpm -r test
      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # v0.0.x ships only @hhc-mcp/core and @hhc-mcp/stdio.
      # @hhc-mcp/http is a scaffold (marked "private": true) — excluded by filter
      # and skipped by pnpm publish for private packages.
      # pnpm publish (not npm publish) is required so the "workspace:*" range in
      # @hhc-mcp/stdio is rewritten to the concrete published version of
      # @hhc-mcp/core before the tarball is uploaded.
      - name: Publish @hhc-mcp/core to npm with provenance
        run: pnpm --filter @hhc-mcp/core publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @hhc-mcp/stdio to npm with provenance
        run: pnpm --filter @hhc-mcp/stdio publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # docker:
