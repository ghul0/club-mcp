name: Bug report
description: Something is broken or misbehaves.
title: "[bug]: <short title>"
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact commands or interactions. Versions and platform. Configuration in use.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@hhc-mcp/core"
        - "@hhc-mcp/stdio"
        - "@hhc-mcp/http"
        - repo / tooling
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact credentials, tokens, and payloads before pasting.
